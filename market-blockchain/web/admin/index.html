<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Blockchain Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Sans', sans-serif; background: #0F172A; color: #E2E8F0; }
        h1, h2, h3, .font-mono { font-family: 'Fira Code', monospace; }
        .metric-card { background: #1E293B; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .metric-value { font-family: 'Fira Code'; font-size: 32px; color: #F59E0B; }
        .metric-label { font-size: 14px; color: #94A3B8; }
        .data-table { background: #1E293B; border-radius: 8px; overflow: hidden; }
        .table-header { background: #0F172A; color: #94A3B8; font-family: 'Fira Code'; font-size: 12px; text-transform: uppercase; padding: 12px 16px; }
        .table-row { border-bottom: 1px solid #334155; padding: 12px 16px; transition: background 200ms; }
        .table-row:hover { background: #334155; cursor: pointer; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-active { background: #10B98120; color: #10B981; }
        .badge-pending { background: #F59E0B20; color: #F59E0B; }
        .badge-failed { background: #EF444420; color: #EF4444; }
        .badge-cancelled { background: #6B728020; color: #9CA3AF; }
        .btn-primary { background: #F59E0B; color: #0F172A; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: all 200ms; cursor: pointer; border: none; }
        .btn-primary:hover { background: #D97706; transform: translateY(-1px); }
        .nav-link { padding: 12px 24px; color: #94A3B8; transition: all 200ms; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-link:hover { color: #E2E8F0; }
        .nav-link.active { color: #F59E0B; border-bottom-color: #F59E0B; }
    </style>
</head>
<body class="min-h-screen" x-data="adminApp()">
    <!-- Navigation -->
    <nav class="bg-slate-900 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <h1 class="text-xl font-bold text-blue-400">Market Blockchain Admin</h1>
                <div class="flex space-x-4">
                    <button @click="currentPage = 'dashboard'" :class="currentPage === 'dashboard' ? 'active' : ''" class="nav-link">Dashboard</button>
                    <button @click="currentPage = 'plans'" :class="currentPage === 'plans' ? 'active' : ''" class="nav-link">Plans</button>
                    <button @click="currentPage = 'subscriptions'" :class="currentPage === 'subscriptions' ? 'active' : ''" class="nav-link">Subscriptions</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Dashboard Page -->
        <div x-show="currentPage === 'dashboard'" x-cloak>
            <h2 class="text-2xl font-bold mb-6">Dashboard Overview</h2>

            <!-- Metrics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="metric-card">
                    <div class="metric-label">Active Subscriptions</div>
                    <div class="metric-value" x-text="metrics.active_subscriptions || 0"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Revenue (30d)</div>
                    <div class="metric-value" x-text="'$' + (metrics.revenue_30d || 0).toFixed(2)"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Pending Charges</div>
                    <div class="metric-value" x-text="metrics.pending_charges_count || 0"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Failed Charges</div>
                    <div class="metric-value" x-text="metrics.failed_charges_count || 0"></div>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="data-table">
                <div class="table-header">Recent Events</div>
                <template x-for="event in recentEvents" :key="event.id">
                    <div class="table-row flex justify-between items-center">
                        <div>
                            <span class="font-mono text-sm" x-text="event.type"></span>
                            <span class="text-xs text-slate-400 ml-2" x-text="formatDate(event.created_at)"></span>
                        </div>
                        <span class="text-xs text-slate-400" x-text="event.identity_address?.substring(0, 10) + '...'"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Plans Page -->
        <div x-show="currentPage === 'plans'" x-cloak>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Subscription Plans</h2>
                <button class="btn-primary" @click="showCreatePlan = true">+ New Plan</button>
            </div>

            <div class="space-y-4">
                <template x-for="plan in plans" :key="plan.plan_id">
                    <div class="metric-card">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-lg font-bold text-amber-400" x-text="plan.name"></h3>
                                <p class="text-sm text-slate-400 mt-1" x-text="plan.description"></p>
                                <div class="mt-4 space-y-1">
                                    <div class="text-sm"><span class="text-slate-400">Price:</span> <span class="font-mono text-amber-400" x-text="plan.amount_usdc_display"></span></div>
                                    <div class="text-sm"><span class="text-slate-400">Period:</span> <span x-text="(plan.period_seconds / 86400) + ' days'"></span></div>
                                    <div class="text-sm"><span class="text-slate-400">Active Subscribers:</span> <span x-text="plan.active_subscribers || 0"></span></div>
                                </div>
                            </div>
                            <span :class="plan.active ? 'badge-active' : 'badge-cancelled'" class="badge" x-text="plan.active ? 'Active' : 'Inactive'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Subscriptions Page -->
        <div x-show="currentPage === 'subscriptions'" x-cloak>
            <h2 class="text-2xl font-bold mb-6">Subscriptions</h2>

            <div class="data-table">
                <div class="table-header grid grid-cols-7 gap-4">
                    <div>ID</div>
                    <div>Identity</div>
                    <div>Plan</div>
                    <div>Status</div>
                    <div>Uplink</div>
                    <div>Downlink</div>
                    <div>Period End</div>
                </div>
                <template x-for="sub in subscriptions" :key="sub.id">
                    <div class="table-row grid grid-cols-7 gap-4 items-center">
                        <div class="font-mono text-xs" x-text="sub.id.substring(0, 12) + '...'"></div>
                        <div class="font-mono text-xs" x-text="sub.identity_address.substring(0, 10) + '...'"></div>
                        <div class="text-sm" x-text="sub.plan_id"></div>
                        <div>
                            <span :class="'badge-' + sub.status" class="badge" x-text="sub.status"></span>
                        </div>
                        <div class="text-xs text-amber-400" x-text="formatBytes(sub.uplink || 0)"></div>
                        <div class="text-xs text-amber-400" x-text="formatBytes(sub.downlink || 0)"></div>
                        <div class="text-xs text-slate-400" x-text="formatDate(sub.current_period_end)"></div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function adminApp() {
            return {
                currentPage: 'dashboard',
                metrics: {},
                recentEvents: [],
                plans: [],
                subscriptions: [],
                showCreatePlan: false,

                async init() {
                    await this.loadDashboard();
                    await this.loadPlans();
                    await this.loadSubscriptions();
                },

                async loadDashboard() {
                    try {
                        const response = await fetch('/admin/api/v1/dashboard/metrics');
                        this.metrics = await response.json();

                        const eventsResponse = await fetch('/admin/api/v1/dashboard/recent-events?limit=10');
                        const eventsData = await eventsResponse.json();
                        this.recentEvents = eventsData.events || [];
                    } catch (error) {
                        console.error('Failed to load dashboard:', error);
                    }
                },

                async loadPlans() {
                    try {
                        const response = await fetch('/admin/api/v1/plans');
                        const data = await response.json();
                        this.plans = data.plans || [];
                    } catch (error) {
                        console.error('Failed to load plans:', error);
                    }
                },

                async loadSubscriptions() {
                    try {
                        const response = await fetch('/admin/api/v1/subscriptions?limit=50');
                        const data = await response.json();
                        this.subscriptions = data.subscriptions || [];
                    } catch (error) {
                        console.error('Failed to load subscriptions:', error);
                    }
                },

                formatDate(timestamp) {
                    if (!timestamp) return 'N/A';
                    const date = new Date(timestamp);
                    return date.toLocaleString();
                },

                formatBytes(bytes) {
                    if (!bytes || bytes === 0) return '0 B';
                    const unit = 1024;
                    if (bytes < unit) return bytes + ' B';
                    const units = ['KB', 'MB', 'GB', 'TB'];
                    let unitIndex = -1;
                    let size = bytes;
                    do {
                        size /= unit;
                        unitIndex++;
                    } while (size >= unit && unitIndex < units.length - 1);
                    return size.toFixed(1) + ' ' + units[unitIndex];
                }
            }
        }
    </script>
</body>
</html>
