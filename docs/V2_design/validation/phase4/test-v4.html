<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VPNCreditVaultV4 测试</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 20px; }
        .section { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #eee; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>VPNCreditVaultV4 订阅测试</h1>

    <div class="section">
        <h2>1. 查看套餐</h2>
        <button onclick="loadPlans()">加载套餐</button>
        <div id="plans"></div>
    </div>

    <div class="section">
        <h2>2. 准备订阅</h2>
        <input id="identityAddress" placeholder="Identity Address" style="width: 400px;" value="0xaaaa000000000000000000000000000000000001">
        <select id="planId">
            <option value="plan-30min-01">0.1 USDC / 30分钟</option>
            <option value="plan-30min-02">0.2 USDC / 30分钟</option>
            <option value="plan-30min-03">0.3 USDC / 30分钟</option>
        </select>
        <button onclick="prepare()">准备订阅</button>
        <div id="prepareResult"></div>
    </div>

    <div class="section">
        <h2>状态</h2>
        <div id="status"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        async function loadPlans() {
            try {
                const res = await fetch(`${API_BASE}/api/plans`);
                const data = await res.json();
                document.getElementById('plans').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                document.getElementById('plans').innerHTML = `<span class="error">错误: ${err.message}</span>`;
            }
        }

        async function prepare() {
            try {
                const identityAddress = document.getElementById('identityAddress').value;
                const planId = document.getElementById('planId').value;

                const res = await fetch(`${API_BASE}/api/v4/subscription/prepare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identityAddress, planId })
                });

                const data = await res.json();
                document.getElementById('prepareResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

                if (data.success) {
                    document.getElementById('status').innerHTML = `
                        <span class="success">准备成功！</span><br>
                        下一步：使用钱包签名 USDC Permit，然后调用 /api/v4/subscription/authorize
                    `;
                }
            } catch (err) {
                document.getElementById('prepareResult').innerHTML = `<span class="error">错误: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
