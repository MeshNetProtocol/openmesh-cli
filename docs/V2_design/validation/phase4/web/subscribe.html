<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN 订阅支付</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .info-label {
            color: #666;
        }
        .info-value {
            color: #333;
            font-weight: 600;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            white-space: pre-line;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VPN 订阅支付</h1>
        <p class="subtitle">Base Sepolia 测试网 - 真实支付测试</p>

        <div class="info-box">
            <div class="info-item">
                <span class="info-label">订阅计划</span>
                <span class="info-value">每月订阅</span>
            </div>
            <div class="info-item">
                <span class="info-label">价格</span>
                <span class="info-value">1.00 USDC/月</span>
            </div>
            <div class="info-item">
                <span class="info-label">网络</span>
                <span class="info-value">Base Sepolia</span>
            </div>
            <div class="info-item">
                <span class="info-label">身份地址</span>
                <span class="info-value" id="identityAddress">加载中...</span>
            </div>
        </div>

        <button id="connectBtn" class="btn btn-primary">
            连接 MetaMask
        </button>

        <button id="payBtn" class="btn btn-primary hidden" disabled>
            支付 1 USDC
        </button>

        <div id="status" class="status hidden"></div>
    </div>

    <script>
        const AUTH_SERVICE_URL = 'http://localhost:8080';
        const USDC_ADDRESS = '0x036CbD53842c5426634e7929541eC2318f3dCF7e'; // Base Sepolia USDC
        const BASE_SEPOLIA_CHAIN_ID = 84532;

        // 从环境变量读取服务钱包地址（需要从服务端获取）
        let SERVICE_WALLET = '';
        let provider, signer, userAddress, identityAddress, orderId;

        // 从 URL 获取 identity_address
        const urlParams = new URLSearchParams(window.location.search);
        identityAddress = urlParams.get('identity_address');

        if (!identityAddress) {
            showStatus('错误：缺少 identity_address 参数', 'error');
        } else {
            document.getElementById('identityAddress').textContent =
                identityAddress.substring(0, 6) + '...' + identityAddress.substring(38);
        }

        // 页面加载时获取服务配置
        async function loadConfig() {
            try {
                const response = await fetch(`${AUTH_SERVICE_URL}/poc/config`);
                const config = await response.json();
                SERVICE_WALLET = config.service_wallet_address;
                console.log('服务配置已加载:', config);
            } catch (error) {
                console.error('加载配置失败:', error);
                showStatus('加载配置失败: ' + error.message, 'error');
            }
        }

        loadConfig();

        // USDC ABI (只需要 transfer 和 approve 方法)
        const USDC_ABI = [
            "function transfer(address to, uint256 amount) returns (bool)",
            "function approve(address spender, uint256 amount) returns (bool)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        // 连接 MetaMask
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                if (typeof window.ethereum === 'undefined') {
                    showStatus('请安装 MetaMask', 'error');
                    return;
                }

                showStatus('正在连接 MetaMask...', 'info');

                // 先检查网络
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (parseInt(chainId, 16) !== BASE_SEPOLIA_CHAIN_ID) {
                    showStatus('请切换到 Base Sepolia 测试网\nChain ID: 84532', 'error');
                    return;
                }

                // 创建 provider（不指定网络，让它自动检测）
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                // 检查 USDC 余额
                const usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
                const balance = await usdcContract.balanceOf(userAddress);
                const balanceFormatted = ethers.utils.formatUnits(balance, 6);

                showStatus(`已连接: ${userAddress.substring(0, 6)}...${userAddress.substring(38)}\nUSDC 余额: ${balanceFormatted}`, 'success');

                if (balance.lt(ethers.utils.parseUnits('1', 6))) {
                    showStatus(`USDC 余额不足\n当前余额: ${balanceFormatted} USDC\n需要至少 1 USDC`, 'error');
                    return;
                }

                // 创建订阅请求
                const createResponse = await fetch(`${AUTH_SERVICE_URL}/poc/subscriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identity_address: identityAddress,
                        plan_id: 'monthly'
                    })
                });

                if (!createResponse.ok) {
                    throw new Error('创建订阅请求失败');
                }

                const subscription = await createResponse.json();
                orderId = subscription.order_id;
                console.log('订阅请求已创建:', subscription);

                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('payBtn').classList.remove('hidden');
                document.getElementById('payBtn').disabled = false;

            } catch (error) {
                console.error(error);
                showStatus('连接失败: ' + error.message, 'error');
            }
        });

        // 支付 USDC
        document.getElementById('payBtn').addEventListener('click', async () => {
            try {
                const btn = document.getElementById('payBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span> 处理中...';

                showStatus('正在发送 USDC 支付交易...', 'info');

                // 创建 USDC 合约实例
                const usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);

                // 发送 1 USDC 到服务地址
                const amount = ethers.utils.parseUnits('1', 6); // 1 USDC (6 decimals)
                const tx = await usdcContract.transfer(SERVICE_WALLET, amount);

                showStatus('交易已发送，等待确认...\nTx: ' + tx.hash.substring(0, 10) + '...', 'info');

                // 等待交易确认
                const receipt = await tx.wait();

                console.log('交易已确认:', receipt);
                showStatus('交易已确认！正在激活订阅...', 'info');

                // 激活订阅
                const activateResponse = await fetch(
                    `${AUTH_SERVICE_URL}/poc/subscriptions/${orderId}/activate`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            transaction_hash: tx.hash
                        })
                    }
                );

                if (!activateResponse.ok) {
                    const error = await activateResponse.text();
                    throw new Error('激活订阅失败: ' + error);
                }

                const result = await activateResponse.json();
                console.log('订阅已激活:', result);

                showStatus('✓ 支付成功！订阅已激活\n\n交易哈希: ' + tx.hash.substring(0, 20) + '...', 'success');

                setTimeout(() => {
                    window.close();
                }, 5000);

            } catch (error) {
                console.error(error);
                showStatus('支付失败: ' + error.message, 'error');

                const btn = document.getElementById('payBtn');
                btn.disabled = false;
                btn.textContent = '重试';
            }
        });

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
        }
    </script>
</body>
</html>
