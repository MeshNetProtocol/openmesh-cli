<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 4 文件型订阅 POC</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            color: #1f2937;
        }
        .page {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            align-items: start;
        }
        .panel {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            padding: 24px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: #111827;
        }
        .subtitle {
            margin: 0 0 20px;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }
        .section-title {
            margin: 0 0 12px;
            font-size: 16px;
            color: #111827;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .info-box {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid #e5e7eb;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .info-item:last-child { margin-bottom: 0; }
        .info-label { color: #6b7280; }
        .info-value {
            color: #111827;
            font-weight: 600;
            text-align: right;
            word-break: break-all;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #eef2ff;
            color: #4338ca;
        }
        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }
        .status {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            white-space: pre-line;
            line-height: 1.6;
        }
        .status.info { background: #dbeafe; color: #1d4ed8; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #b91c1c; }
        .state-panel {
            min-height: 760px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .small {
            font-size: 12px;
            color: #6b7280;
        }
        pre {
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 16px;
            padding: 18px;
            overflow: auto;
            min-height: 680px;
            font-size: 12px;
            line-height: 1.6;
        }
        @media (max-width: 980px) {
            .page {
                grid-template-columns: 1fr;
            }
            .state-panel {
                min-height: auto;
            }
            pre {
                min-height: 360px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="panel">
            <h1>Phase 4 文件型订阅 POC</h1>
            <p class="subtitle">
                这个页面已经切换到新的 file-based POC 流程，用于验证：订阅、授权、首次扣费、取消、升级、降级、过期模拟、续费与状态查看。
            </p>

            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">当前网络</span>
                    <span class="info-value" id="networkValue">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Vault 合约</span>
                    <span class="info-value" id="vaultAddressValue">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">服务钱包</span>
                    <span class="info-value" id="serviceWalletValue">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">当前订阅ID</span>
                    <span class="info-value" id="currentSubscriptionId">未创建</span>
                </div>
            </div>

            <h2 class="section-title">创建订阅</h2>
            <div class="field">
                <label for="identityAddress">Identity Address</label>
                <input id="identityAddress" placeholder="0xaaaa..." />
            </div>
            <div class="field">
                <label for="payerAddress">Payer Address</label>
                <input id="payerAddress" placeholder="0xbbbb..." />
            </div>
            <div class="field">
                <label for="planSelect">套餐</label>
                <select id="planSelect"></select>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="expectedAllowance">Expected Allowance</label>
                    <input id="expectedAllowance" type="number" value="0" min="0" />
                </div>
                <div class="field">
                    <label for="targetAllowance">Target Allowance</label>
                    <input id="targetAllowance" type="number" value="3" min="1" />
                </div>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="permitDeadlineMinutes">Permit Deadline Minutes</label>
                    <input id="permitDeadlineMinutes" type="number" value="30" min="1" />
                </div>
                <div class="field">
                    <label for="permitNonce">Permit Nonce（POC 展示字段）</label>
                    <input id="permitNonce" value="" placeholder="prepare 后自动填充" />
                </div>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="signatureV">Signature V（可选）</label>
                    <input id="signatureV" type="number" value="0" min="0" />
                </div>
                <div class="field">
                    <label for="expiredHoursAgo">Expired Hours Ago</label>
                    <input id="expiredHoursAgo" type="number" value="1" min="1" />
                </div>
            </div>

            <div class="field">
                <label for="signatureInput">Permit Signature</label>
                <textarea id="signatureInput" rows="3" placeholder="prepare + sign 后自动填充，或手工粘贴 0x... signature"></textarea>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="signatureR">Signature R（可选）</label>
                    <input id="signatureR" placeholder="0x..." />
                </div>
                <div class="field">
                    <label for="signatureS">Signature S（可选）</label>
                    <input id="signatureS" placeholder="0x..." />
                </div>
            </div>

            <div class="field">
                <label for="manualSubscriptionId">手工指定 Subscription ID（可选）</label>
                <input id="manualSubscriptionId" placeholder="留空则使用当前页面中的 subscription_id" />
            </div>

            <div class="btn-grid">
                <button class="btn btn-primary" id="createSubscriptionBtn">1. 创建订阅</button>
                <button class="btn btn-secondary" id="preparePermitBtn">2. Prepare Permit</button>
                <button class="btn btn-secondary" id="authorizeBtn">3. 签名并提交授权</button>
                <button class="btn btn-primary" id="initialChargeBtn">4. 首次扣费</button>
                <button class="btn btn-secondary" id="queryBtn">5. 查询订阅</button>
                <button class="btn btn-danger" id="cancelBtn">取消订阅</button>
                <button class="btn btn-secondary" id="expireBtn">模拟过期</button>
                <button class="btn btn-primary" id="renewBtn">执行续费</button>
                <button class="btn btn-secondary" id="refreshStateBtn">刷新全量状态</button>
            </div>

            <div class="btn-grid" style="margin-top:10px;">
                <button class="btn btn-primary" id="upgradeBtn">升级到 yearly-pro</button>
                <button class="btn btn-secondary" id="downgradeBtn">降级到 monthly-basic</button>
            </div>

            <div id="status" class="status info">页面初始化中...</div>
        </div>

        <div class="panel state-panel">
            <div class="toolbar">
                <div>
                    <h2 class="section-title" style="margin-bottom:4px;">POC 调试状态</h2>
                    <div class="small">直接展示 `/poc/debug/state` 的返回，方便观察 JSON 文件状态流转。</div>
                </div>
                <button class="btn btn-secondary" id="copyStateBtn">复制状态</button>
            </div>
            <pre id="debugState">加载中...</pre>
        </div>
    </div>

    <script>
        const AUTH_SERVICE_URL = 'http://localhost:8080';
        let currentSubscriptionId = '';
        let loadedPlans = [];
        let loadedConfig = null;
        let preparedPermit = null;

        const statusEl = document.getElementById('status');
        const debugStateEl = document.getElementById('debugState');
        const currentSubscriptionIdEl = document.getElementById('currentSubscriptionId');

        const identityAddressInput = document.getElementById('identityAddress');
        const payerAddressInput = document.getElementById('payerAddress');
        const planSelect = document.getElementById('planSelect');
        const expectedAllowanceInput = document.getElementById('expectedAllowance');
        const targetAllowanceInput = document.getElementById('targetAllowance');
        const permitDeadlineMinutesInput = document.getElementById('permitDeadlineMinutes');
        const permitNonceInput = document.getElementById('permitNonce');
        const signatureInput = document.getElementById('signatureInput');
        const signatureVInput = document.getElementById('signatureV');
        const signatureRInput = document.getElementById('signatureR');
        const signatureSInput = document.getElementById('signatureS');
        const expiredHoursAgoInput = document.getElementById('expiredHoursAgo');
        const manualSubscriptionIdInput = document.getElementById('manualSubscriptionId');

        const urlParams = new URLSearchParams(window.location.search);
        const identityFromURL = urlParams.get('identity_address');
        if (identityFromURL) {
            identityAddressInput.value = identityFromURL;
        } else {
            identityAddressInput.value = '0xaaaa000000000000000000000000000000000011';
        }
        payerAddressInput.value = '0xbbbb000000000000000000000000000000000011';

        function setStatus(message, type = 'info') {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        function shortAddress(value) {
            if (!value || value.length < 10) return value || '--';
            return `${value.slice(0, 6)}...${value.slice(-4)}`;
        }

        function getSelectedSubscriptionId() {
            return manualSubscriptionIdInput.value.trim() || currentSubscriptionId;
        }

        function setCurrentSubscriptionId(subscriptionId) {
            currentSubscriptionId = subscriptionId || '';
            currentSubscriptionIdEl.textContent = currentSubscriptionId || '未创建';
        }

        function splitSignature(signature) {
            if (!signature || typeof signature !== 'string') {
                return { v: 0, r: '', s: '' };
            }
            const normalized = signature.startsWith('0x') ? signature.slice(2) : signature;
            if (normalized.length !== 130) {
                return { v: 0, r: '', s: '' };
            }
            const r = `0x${normalized.slice(0, 64)}`;
            const s = `0x${normalized.slice(64, 128)}`;
            let v = parseInt(normalized.slice(128, 130), 16);
            if (v < 27) v += 27;
            return { v, r, s };
        }

        async function signPreparedPermit(prepared) {
            if (!window.ethereum) {
                throw new Error('未检测到钱包，请先在浏览器中安装并启用 MetaMask');
            }
            const owner = prepared.owner_address || payerAddressInput.value.trim();
            if (!owner) {
                throw new Error('缺少 owner 地址，无法签名');
            }

            await window.ethereum.request({ method: 'eth_requestAccounts' });
            const payload = JSON.stringify({
                domain: prepared.domain,
                types: {
                    EIP712Domain: [
                        { name: 'name', type: 'string' },
                        { name: 'version', type: 'string' },
                        { name: 'chainId', type: 'uint256' },
                        { name: 'verifyingContract', type: 'address' }
                    ],
                    Permit: prepared.types.Permit
                },
                primaryType: 'Permit',
                message: prepared.message
            });

            return window.ethereum.request({
                method: 'eth_signTypedData_v4',
                params: [owner, payload]
            });
        }

        function formatJSON(data) {
            return JSON.stringify(data, null, 2);
        }

        async function requestJSON(path, options = {}) {
            const response = await fetch(`${AUTH_SERVICE_URL}${path}`, options);
            const text = await response.text();
            let data;
            try {
                data = text ? JSON.parse(text) : {};
            } catch (error) {
                data = text;
            }
            if (!response.ok) {
                throw new Error(typeof data === 'string' ? data : JSON.stringify(data));
            }
            return data;
        }

        function updateConfigUI(config) {
            document.getElementById('networkValue').textContent = config.network || '--';
            document.getElementById('vaultAddressValue').textContent = shortAddress(config.vault_contract_address || '--');
            document.getElementById('serviceWalletValue').textContent = shortAddress(config.service_wallet_address || '--');
        }

        function refillTargetAllowanceFromPlan(planId) {
            const plan = loadedPlans.find(item => item.plan_id === planId);
            if (!plan) return;
            targetAllowanceInput.value = String(plan.amount_usdc * plan.allowance_periods);
        }

        async function loadConfig() {
            loadedConfig = await requestJSON('/poc/config');
            updateConfigUI(loadedConfig);
        }

        async function loadPlans() {
            const result = await requestJSON('/poc/plans');
            loadedPlans = result.plans || [];
            planSelect.innerHTML = '';
            loadedPlans.forEach(plan => {
                const option = document.createElement('option');
                option.value = plan.plan_id;
                option.textContent = `${plan.name} · ${plan.amount_usdc} USDC / ${plan.period_days} 天`;
                planSelect.appendChild(option);
            });
            if (loadedPlans.length > 0) {
                planSelect.value = 'monthly-basic';
                refillTargetAllowanceFromPlan(planSelect.value);
            }
        }

        async function refreshDebugState() {
            const state = await requestJSON('/poc/debug/state');
            debugStateEl.textContent = formatJSON(state);
            return state;
        }

        async function createSubscription() {
            const payload = {
                identity_address: identityAddressInput.value.trim(),
                payer_address: payerAddressInput.value.trim(),
                plan_id: planSelect.value
            };
            const result = await requestJSON('/poc/subscriptions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            setCurrentSubscriptionId(result.subscription_id);
            preparedPermit = null;
            permitNonceInput.value = '';
            signatureInput.value = '';
            signatureVInput.value = '0';
            signatureRInput.value = '';
            signatureSInput.value = '';
            setStatus(`创建订阅成功\nsubscription_id: ${result.subscription_id}`, 'success');
            await refreshDebugState();
        }

        async function preparePermit() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const payload = {
                subscription_id: subscriptionId,
                target_allowance: Number(targetAllowanceInput.value || 0),
                deadline_minutes: Number(permitDeadlineMinutesInput.value || 30)
            };
            const result = await requestJSON('/poc/authorizations/prepare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            preparedPermit = result;
            expectedAllowanceInput.value = String(result.expected_allowance ?? 0);
            targetAllowanceInput.value = String(result.target_allowance ?? 0);
            permitDeadlineMinutesInput.value = String(result.deadline_minutes ?? permitDeadlineMinutesInput.value);
            permitNonceInput.value = result.permit_nonce || '';
            signatureInput.value = '';
            signatureVInput.value = '0';
            signatureRInput.value = '';
            signatureSInput.value = '';
            setStatus(`Permit 已准备完成\ndeadline: ${result.permit_deadline}\nowner: ${result.owner_address}`, 'success');
            await refreshDebugState();
        }

        async function authorizePermit() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');

            if (!preparedPermit || preparedPermit.subscription_id !== subscriptionId) {
                preparedPermit = await requestJSON('/poc/authorizations/prepare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subscription_id: subscriptionId,
                        target_allowance: Number(targetAllowanceInput.value || 0),
                        deadline_minutes: Number(permitDeadlineMinutesInput.value || 30)
                    })
                });
            }

            let signature = signatureInput.value.trim();
            if (!signature) {
                signature = await signPreparedPermit(preparedPermit);
            }

            const parts = splitSignature(signature);
            signatureInput.value = signature;
            signatureVInput.value = String(parts.v || 0);
            signatureRInput.value = parts.r || '';
            signatureSInput.value = parts.s || '';
            permitNonceInput.value = preparedPermit.permit_nonce || permitNonceInput.value;

            const payload = {
                subscription_id: subscriptionId,
                expected_allowance: Number(expectedAllowanceInput.value || preparedPermit.expected_allowance || 0),
                target_allowance: Number(targetAllowanceInput.value || preparedPermit.target_allowance || 0),
                deadline: Number(preparedPermit.permit_deadline_unix || 0),
                signature,
                signature_v: Number(signatureVInput.value || parts.v || 0),
                signature_r: signatureRInput.value.trim() || parts.r || '',
                signature_s: signatureSInput.value.trim() || parts.s || '',
                permit_nonce: permitNonceInput.value.trim() || preparedPermit.permit_nonce || '',
                chain_id: Number(preparedPermit.chain_id || 0),
                token_address: preparedPermit.token_address || '',
                spender_address: preparedPermit.spender_address || '',
                owner_address: preparedPermit.owner_address || payerAddressInput.value.trim()
            };
            const result = await requestJSON('/poc/authorizations/permit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            let statusMsg = `授权记录成功\nevent_id: ${result.event_id}\nstatus: ${result.status}`;
            if (result.authorization_tx_hash) {
                statusMsg += `\n✅ 链上提交成功\ntx_hash: ${result.authorization_tx_hash}`;
            } else {
                statusMsg += `\n⚠️  未启用链上提交（mock 模式）`;
            }
            setStatus(statusMsg, 'success');
            await refreshDebugState();
        }

        async function initialCharge() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/charges/initial', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId })
            });
            setStatus(`首次扣费完成\ncharge_id: ${result.charge_id || result.message}`, 'success');
            await refreshDebugState();
        }

        async function querySubscription() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/subscriptions/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId })
            });
            debugStateEl.textContent = formatJSON(result);
            setStatus(`查询成功\nstatus: ${result.subscription?.status || '--'}\nplan: ${result.subscription?.plan_id || '--'}`, 'success');
        }

        async function cancelSubscription() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/subscriptions/cancel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId })
            });
            setStatus(`取消订阅成功\nstatus: ${result.status}\nauto_renew: ${result.auto_renew}`, 'success');
            await refreshDebugState();
        }

        async function simulateExpire() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/test/expire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subscription_id: subscriptionId,
                    expired_hours_ago: Number(expiredHoursAgoInput.value || 1)
                })
            });
            setStatus(`已模拟过期\nmessage: ${result.message}`, 'success');
            await refreshDebugState();
        }

        async function renewCharge() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/charges/renew', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId })
            });
            setStatus(`续费完成\ncharge_id: ${result.charge_id || '--'}`, 'success');
            await refreshDebugState();
        }

        async function upgradeSubscription() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/subscriptions/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId, plan_id: 'yearly-pro' })
            });
            setStatus(`升级成功\nplan_id: ${result.plan_id}\namount_usdc: ${result.amount_usdc}`, 'success');
            await refreshDebugState();
        }

        async function downgradeSubscription() {
            const subscriptionId = getSelectedSubscriptionId();
            if (!subscriptionId) throw new Error('请先创建订阅或手工填入 subscription_id');
            const result = await requestJSON('/poc/subscriptions/downgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subscription_id: subscriptionId, plan_id: 'monthly-basic' })
            });
            setStatus(`降级登记成功\npending_plan_id: ${result.pending_plan_id || '--'}`, 'success');
            await refreshDebugState();
        }

        async function copyState() {
            try {
                await navigator.clipboard.writeText(debugStateEl.textContent);
                setStatus('已复制当前调试状态到剪贴板', 'success');
            } catch (error) {
                setStatus('复制失败: ' + error.message, 'error');
            }
        }

        async function runAction(action) {
            try {
                setStatus('处理中...', 'info');
                await action();
            } catch (error) {
                console.error(error);
                setStatus('操作失败: ' + error.message, 'error');
            }
        }

        planSelect.addEventListener('change', () => refillTargetAllowanceFromPlan(planSelect.value));
        document.getElementById('createSubscriptionBtn').addEventListener('click', () => runAction(createSubscription));
        document.getElementById('preparePermitBtn').addEventListener('click', () => runAction(preparePermit));
        document.getElementById('authorizeBtn').addEventListener('click', () => runAction(authorizePermit));
        document.getElementById('initialChargeBtn').addEventListener('click', () => runAction(initialCharge));
        document.getElementById('queryBtn').addEventListener('click', () => runAction(querySubscription));
        document.getElementById('cancelBtn').addEventListener('click', () => runAction(cancelSubscription));
        document.getElementById('expireBtn').addEventListener('click', () => runAction(simulateExpire));
        document.getElementById('renewBtn').addEventListener('click', () => runAction(renewCharge));
        document.getElementById('upgradeBtn').addEventListener('click', () => runAction(upgradeSubscription));
        document.getElementById('downgradeBtn').addEventListener('click', () => runAction(downgradeSubscription));
        document.getElementById('refreshStateBtn').addEventListener('click', () => runAction(refreshDebugState));
        document.getElementById('copyStateBtn').addEventListener('click', () => runAction(copyState));

        async function init() {
            try {
                await loadConfig();
                await loadPlans();
                await refreshDebugState();
                setStatus('页面已准备好。建议按顺序执行：创建订阅 → Prepare Permit → 钱包签名并提交授权 → 首次扣费 → 查询 / 取消 / 升降级 / 过期 / 续费。', 'success');
            } catch (error) {
                console.error(error);
                setStatus('初始化失败: ' + error.message, 'error');
            }
        }

        init();
    </script>
</body>
</html>
