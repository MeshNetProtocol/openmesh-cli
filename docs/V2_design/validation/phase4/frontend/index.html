<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPNCreditVaultV4 订阅服务</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    .header h1 { font-size: 2.5em; margin-bottom: 10px; }
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .card h2 { margin-bottom: 20px; color: #333; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin: 5px;
    }
    .btn:hover { transform: translateY(-2px); transition: all 0.2s; }
    .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 14px;
      white-space: pre-line;
    }
    .status.info { background: #e3f2fd; color: #1976d2; }
    .status.success { background: #e8f5e9; color: #388e3c; }
    .status.error { background: #ffebee; color: #d32f2f; }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 14px;
    }
    .plan-card {
      border: 2px solid #e0e0e0;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plan-card:hover { border-color: #667eea; }
    .plan-card.selected { border-color: #667eea; background: #f5f7ff; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>VPNCreditVaultV4 订阅</h1>
      <p>基于 ERC-2612 Permit 的自动扣费订阅服务</p>
    </div>

    <div id="connectSection" class="card">
      <h2>连接钱包</h2>
      <button class="btn" id="connectBtn">连接 MetaMask</button>
      <div id="connectStatus" class="status info">请点击按钮连接 MetaMask 钱包</div>
    </div>

    <div id="mainSection" class="card hidden">
      <h2>账户信息</h2>
      <p>地址: <span id="address"></span></p>
      <p>USDC 余额: <span id="balance">--</span></p>

      <h2 style="margin-top: 30px;">选择套餐</h2>
      <div id="plans"></div>

      <h2 style="margin-top: 30px;">Identity Address</h2>
      <input id="identityAddress" placeholder="0x..." />

      <button class="btn" id="subscribeBtn">订阅</button>
      <div id="mainStatus" class="status info hidden"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api';
    const CHAIN_ID = 84532;
    const USDC_ADDRESS = '0x036CbD53842c5426634e7929541eC2318f3dCF7e';
    const VAULT_ADDRESS = '0xcedFdeC347EEdE0E1cF567D3b659158DbbdE1263';

    let userAddress = '';
    let selectedPlan = null;
    let plans = [];

    function setStatus(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = `status ${type}`;
      el.classList.remove('hidden');
    }

    function splitSignature(sig) {
      const normalized = sig.startsWith('0x') ? sig.slice(2) : sig;
      const r = '0x' + normalized.slice(0, 64);
      const s = '0x' + normalized.slice(64, 128);
      let v = parseInt(normalized.slice(128, 130), 16);
      if (v < 27) v += 27;
      return { v, r, s };
    }

    async function connectWallet() {
      try {
        if (!window.ethereum) {
          setStatus('connectStatus', '未检测到 MetaMask，请先安装', 'error');
          return;
        }

        setStatus('connectStatus', '正在连接钱包...', 'info');

        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        });

        userAddress = accounts[0];

        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (parseInt(chainId, 16) !== CHAIN_ID) {
          setStatus('connectStatus', '请切换到 Base Sepolia 测试网 (Chain ID: 84532)', 'error');
          return;
        }

        document.getElementById('address').textContent = userAddress;
        document.getElementById('connectSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');

        await loadPlans();
        await loadBalance();

      } catch (error) {
        console.error(error);
        setStatus('connectStatus', '连接失败: ' + error.message, 'error');
      }
    }

    async function loadBalance() {
      try {
        const data = await window.ethereum.request({
          method: 'eth_call',
          params: [{
            to: USDC_ADDRESS,
            data: '0x70a08231' + userAddress.slice(2).padStart(64, '0')
          }, 'latest']
        });
        const balance = parseInt(data, 16) / 1e6;
        document.getElementById('balance').textContent = balance.toFixed(2) + ' USDC';
      } catch (error) {
        document.getElementById('balance').textContent = '加载失败';
      }
    }

    async function loadPlans() {
      try {
        const res = await fetch(`${API_BASE}/plans`);
        const data = await res.json();
        plans = data.plans || [];

        const container = document.getElementById('plans');
        container.innerHTML = plans.map((plan, i) => `
          <div class="plan-card" data-index="${i}">
            <h3>${plan.name}</h3>
            <p>价格: ${plan.amount_usdc} USDC / ${plan.period_seconds / 60} 分钟</p>
          </div>
        `).join('');

        document.querySelectorAll('.plan-card').forEach(el => {
          el.onclick = function() {
            const index = parseInt(this.dataset.index);
            selectedPlan = plans[index];
            document.querySelectorAll('.plan-card').forEach((card, i) => {
              card.classList.toggle('selected', i === index);
            });
          };
        });
      } catch (error) {
        setStatus('mainStatus', '加载套餐失败: ' + error.message, 'error');
      }
    }

    async function subscribe() {
      try {
        if (!selectedPlan) {
          setStatus('mainStatus', '请选择套餐', 'error');
          return;
        }

        const identityAddress = document.getElementById('identityAddress').value.trim();
        if (!identityAddress || !/^0x[a-fA-F0-9]{40}$/.test(identityAddress)) {
          setStatus('mainStatus', '请输入有效的 Identity Address', 'error');
          return;
        }

        setStatus('mainStatus', '准备订阅参数...', 'info');

        const prepareRes = await fetch(`${API_BASE}/v4/subscription/prepare`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            identityAddress,
            planId: selectedPlan.plan_id
          })
        });
        const prepareData = await prepareRes.json();

        if (!prepareData.success) {
          setStatus('mainStatus', '准备失败: ' + (prepareData.error || '未知错误'), 'error');
          return;
        }

        setStatus('mainStatus', '请在 MetaMask 中签名 USDC Permit...', 'info');

        const payload = JSON.stringify({
          domain: {
            name: 'USD Coin',
            version: '2',
            chainId: CHAIN_ID,
            verifyingContract: USDC_ADDRESS
          },
          types: {
            EIP712Domain: [
              { name: 'name', type: 'string' },
              { name: 'version', type: 'string' },
              { name: 'chainId', type: 'uint256' },
              { name: 'verifyingContract', type: 'address' }
            ],
            Permit: [
              { name: 'owner', type: 'address' },
              { name: 'spender', type: 'address' },
              { name: 'value', type: 'uint256' },
              { name: 'nonce', type: 'uint256' },
              { name: 'deadline', type: 'uint256' }
            ]
          },
          primaryType: 'Permit',
          message: {
            owner: userAddress,
            spender: VAULT_ADDRESS,
            value: prepareData.targetAllowance.toString(),
            nonce: prepareData.nonce.toString(),
            deadline: prepareData.deadline
          }
        });

        const signature = await window.ethereum.request({
          method: 'eth_signTypedData_v4',
          params: [userAddress, payload]
        });

        const sig = splitSignature(signature);

        setStatus('mainStatus', '提交授权到链上...', 'info');

        const authRes = await fetch(`${API_BASE}/v4/subscription/authorize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userAddress,
            identityAddress,
            expectedAllowance: 0,
            targetAllowance: prepareData.targetAllowance,
            deadline: prepareData.deadline,
            v: sig.v,
            r: sig.r,
            s: sig.s
          })
        });

        const authData = await authRes.json();
        if (!authData.success) {
          setStatus('mainStatus', '授权失败: ' + (authData.error || '未知错误'), 'error');
          return;
        }

        setStatus('mainStatus', '授权成功！\n交易哈希: ' + authData.transactionHash + '\n\n执行首次扣费...', 'success');

        const chargeId = '0x' + Array.from(crypto.getRandomValues(new Uint8Array(32)))
          .map(b => b.toString(16).padStart(2, '0')).join('');

        const chargeRes = await fetch(`${API_BASE}/v4/subscription/charge`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            identityAddress,
            amount: selectedPlan.amount_usdc_base_units,
            chargeId
          })
        });

        const chargeData = await chargeRes.json();
        if (!chargeData.success) {
          setStatus('mainStatus', '扣费失败: ' + (chargeData.error || '未知错误'), 'error');
          return;
        }

        setStatus('mainStatus', '订阅成功！\n授权交易: ' + authData.transactionHash + '\n扣费交易: ' + chargeData.transactionHash, 'success');
        await loadBalance();

      } catch (error) {
        console.error(error);
        setStatus('mainStatus', '订阅失败: ' + error.message, 'error');
      }
    }

    document.getElementById('connectBtn').onclick = connectWallet;
    document.getElementById('subscribeBtn').onclick = subscribe;
  </script>
</body>
</html>
